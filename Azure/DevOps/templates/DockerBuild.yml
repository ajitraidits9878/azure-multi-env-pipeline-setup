parameters:
  - name: name
    type: string
  - name: repository
    type: string
  - name: buildContextPath
    type: string

steps:
  - task: Docker@2
    displayName: "Build Image: ${{ parameters.repository }}"
    inputs:
      command: build
      repository: "${{ parameters.repository }}"
      dockerfile: "${{ parameters.buildContextPath }}/Dockerfile"
      buildContext: "${{ parameters.buildContextPath }}"
      tags: $(Build.BuildId)

  - task: Docker@2
    displayName: "Save Image to TAR: ${{ parameters.repository }}"
    inputs:
      command: save
      repository: "${{ parameters.repository }}"
      arguments: "--output $(Build.ArtifactStagingDirectory)/Images/${{ parameters.name }}.image.tar ${{ parameters.repository }}:$(Build.BuildId)"
