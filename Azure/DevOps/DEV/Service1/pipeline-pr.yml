# Pipeline: Service1 - PR Validation (DEV)
# Trigger: Pull Requests targeting the 'dev' branch
# Purpose: Run build and unit tests before merging feature branches

name: Service1 - PR Validation

pr:
  branches:
    include:
      - dev
  paths:
    include:
      - /src/Service1/*
      - /tests/Service1/*
    exclude:
      - /Azure/*
      - /DevOps/*

pool:
  name: "Default"

workspace:
  clean: all

steps:
  - template: "../../templates/SetupBuildTemplatePR.yml"
    parameters:
      project: "src/Service1/Service1.sln"

  - template: "../../templates/RunUnitTests.yml"
    parameters:
      project: "src/Service1/Service1.sln"
