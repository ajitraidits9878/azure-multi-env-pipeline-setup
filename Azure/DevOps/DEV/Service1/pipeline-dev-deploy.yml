# Pipeline: Service1 - DEV CI/CD
# Trigger: Push to 'dev' branch when Service1 source files change
# Purpose: Build, test, create EF migration bundle, push Docker image, run SQL scripts, and validate deployment

name: Service1 - DEV CI/CD

trigger:
  batch: true
  branches:
    include:
      - dev
  paths:
    include:
      - /src/Service1/*
      - /tests/Service1/*
    exclude:
      - /Azure/*
      - /DevOps/*

stages:
  - stage: "CI"
    displayName: "CI: Build / Test / Publish"
    pool: "Default"
    variables:
      buildConfiguration: "Release"

    jobs:
      - job: "BuildTestPublish"
        displayName: "Build, Test & Publish Artifacts"

        workspace:
          clean: all

        steps:
          # --------------------------------------------------
          # Step 1: Restore & Build
          # --------------------------------------------------
          - template: "../../templates/BuildMain.yml"
            parameters:
              project: "src/Service1/Service1.sln"

          # --------------------------------------------------
          # Step 2: Web Publish
          # --------------------------------------------------
          - template: "../../templates/WebPublish.yml"
            parameters:
              project: "src/Service1/Service1.sln"

          # --------------------------------------------------
          # Step 3: Docker Build & Save to TAR
          # --------------------------------------------------
          - template: "../../templates/CreateFolder.yml"
            parameters:
              folderPath: "$(Build.ArtifactStagingDirectory)/Images"

          - template: "../../templates/DockerBuild.yml"
            parameters:
              name: "Service1"
              repository: "api/service1"
              buildContextPath: "src/Service1/Service1.API"

          # --------------------------------------------------
          # Step 4: EF Migrations Bundle
          # --------------------------------------------------
          - template: "../../templates/CreateFolder.yml"
            parameters:
              folderPath: "$(Build.ArtifactStagingDirectory)/EFMigrations"

          - template: "../../templates/CreateMigrationBundle.yml"
            parameters:
              outputPath: "$(Build.ArtifactStagingDirectory)/EFMigrations"
              name: "Service1"
              spnName: "DEV SPN"
              projectPath: "src/Service1/Service1.API"
              connStr: $(Service1DbConnectionString)
              context: "Service1DbContext"

          # --------------------------------------------------
          # Step 5: SQL Scripts
          # --------------------------------------------------
          - template: "../../templates/SQL/MergeSqlFiles.yml"
            parameters:
              serviceName: "Service1"
              rootFolder: "src/Service1/SQL/"

          - template: "../../templates/ApplyMigrationsBundle.yml"
            parameters:
              bundlePath: "$(Build.ArtifactStagingDirectory)/EFMigrations"
              name: "Service1"
              spnName: "DEV SPN"
              connStr: $(Service1DbConnectionString)

          # --------------------------------------------------
          # Step 6: Reset Caches
          # --------------------------------------------------
          - template: "../../templates/ResetLeaseCaches.yml"

          # --------------------------------------------------
          # Step 7: Push Docker Image to ACR
          # --------------------------------------------------
          - task: Docker@2
            displayName: "Login to ACR"
            inputs:
              command: login
              containerRegistry: $(ContainerRegistry)

          - template: "../../templates/DockerPush.yml"
            parameters:
              name: "Service1"
              repository: "api/service1"
              tarFilePath: "$(Build.ArtifactStagingDirectory)/Images"
              buildId: "$(Build.BuildId)"

          - task: Docker@2
            displayName: "Logout from ACR"
            inputs:
              command: logout
              containerRegistry: $(ContainerRegistry)

          # --------------------------------------------------
          # Step 8: Execute SQL Scripts
          # --------------------------------------------------
          - template: "../../templates/SQL/ExecuteSqlScripts.yml"
            parameters:
              serviceName: "Service1"
              rootFolder: "src/Service1/SQL/"
              spnName: "DEV SPN"
              connectionString: $(DevSqlConnectionString)

          # --------------------------------------------------
          # Step 9: Post-Deployment Validation
          # --------------------------------------------------
          - template: "../../templates/ServicePostDeploymentValidation.yml"
            parameters:
              service: $(SERVICE-DEV-API-SERVICE1)

          - powershell: |
              Write-Host "##vso[build.addbuildtag]Completed"
            displayName: "Tag Build as Completed"
