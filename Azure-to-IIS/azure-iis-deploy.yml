trigger:
  branches:
    include:
    - dev
pool:
  name: 'MyAgentPool'
variables:
- name: buildConfiguration
  value: 'Release'
- name: projectName
  value: 'MyProjectName'
- name: websiteName
  value: 'myproject.com'
- name: appPoolName
  value: 'myproject.com'
stages:
- stage: 'Build'
  displayName: 'Build Dev'
  jobs:
  - job: ''
    steps:
    - task: DotNetCoreCLI@2
      displayName: 'Dotnet Restore'
      inputs:
        command: 'restore'
        projects: '*.sln'
    - task: DotNetCoreCLI@2
      displayName: 'Build Dev Release'
      inputs:
        command: 'build'
        projects: '*.sln'
        arguments: --configuration Release
    - task: DotNetCoreCLI@2
      displayName: 'Test Dev Release'
      inputs:
        command: test
        projects: '*.sln'
        arguments: '--configuration $(BuildConfiguration)'
    - task: DotNetCoreCLI@2
      displayName: 'Publish the project - $(buildConfiguration)'
      inputs:
        command: 'publish'
        projects: '**/*.csproj'
        publishWebProjects: false
        arguments: '--no-build --configuration $(buildConfiguration) --output "$(Build.ArtifactStagingDirectory)/$(buildConfiguration)"'
        zipAfterPublish: true
    - task: ecdc45f6-832d-4ad9-b52b-ee49e94659be@1
      displayName: 'Upload Artifact - Dev Release'
      inputs:
        path: '$(Build.ArtifactStagingDirectory)'
        artifactName: drop
- stage: 'Dev'
  displayName: 'Dev Deploy'
  dependsOn:
  - 'Build'
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dev'))
  jobs:
  - deployment: Dev
    displayName: Dev
    environment:
      name: 'Dev'
      resourceType: VirtualMachine
    strategy:
      runOnce:
        deploy:
          steps:
          - task: IISWebAppManagementOnMachineGroup@0
            displayName: 'IIS Stop Website : $(websiteName)'
            inputs:
              IISDeploymentType: 'IISWebsite'
              ActionIISWebsite: 'StopWebsite'
              StartStopWebsiteName: '$(websiteName)'
          - task: PowerShell@2
            displayName: 'Create app_offline.htm'
            inputs:
              targetType: 'inline'
              script: |
                $offlineFile = "C:\inetpub\wwwroot\myproject.com\app_offline.htm"
                New-Item -ItemType File -Path $offlineFile -Force
          - task: IISWebAppDeploymentOnMachineGroup@0
            displayName: 'IIS Deploy Website : $(websiteName)'
            inputs:
              WebSiteName: '$(websiteName)'
              Package: '$(Pipeline.Workspace)/drop/$(buildConfiguration)/MyProject.zip'
          - task: PowerShell@2
            displayName: 'Remove  app_offline.htm'
            inputs:
              targetType: 'inline'
              script: |
                $offlineFile = "C:\inetpub\wwwroot\myproject.com\app_offline.htm"
                Remove-Item -Path $offlineFile -Force
          - task: IISWebAppManagementOnMachineGroup@0
            displayName: 'IIS Start Website : $(websiteName)'
            inputs:
              IISDeploymentType: 'IISWebsite'
              ActionIISWebsite: 'StartWebsite'
              StartStopWebsiteName: '$(websiteName)'

